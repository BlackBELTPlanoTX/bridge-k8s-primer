apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-two-config
data:
  BG_COLOR: "#DDDDDD"
---
apiVersion: v1
kind: Pod
metadata:
  name: frontend-two-pod
spec:
  containers:
    - name: frontend-two
      image: local/frontend-two:1.0
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-two-svc
spec:
  ports:
    - port: 80
      targetPort: 80
      nodePort: 32081
