services:
  frontend-one:
    build:
      context: ./app1
    image: local/frontend-one:1.0
    container_name: frontend-one
    environment:
      BG_COLOR: "#f2f4f8"
    ports:
      - "30080:80"

  frontend-two:
    build:
      context: ./app2
    image: local/frontend-two:1.0
    container_name: frontend-two
    environment:
      BG_COLOR: "#DDDDDD"
    ports:
      - "30081:80"
